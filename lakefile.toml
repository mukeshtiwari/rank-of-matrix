name = "rank-of-matrix"
version = "0.1.0"
defaultTargets = ["rank-of-matrix"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0"

[[lean_lib]]
name = "RankOfMatrix"

[[lean_exe]]
name = "rank-of-matrix"
root = "Main"
